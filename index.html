<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Torta de Naranja - Gestión de Precios</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f8fafc; }
        .card-shadow { box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body class="p-4 md:p-8 font-sans text-gray-800">

    <div class="max-w-2xl mx-auto bg-white rounded-2xl p-6 card-shadow border border-orange-100">
        <h2 class="text-2xl font-bold text-center text-orange-600 mb-6 uppercase tracking-wider">
            Torta de Naranja
        </h2>

        <div class="flex bg-gray-100 p-1 rounded-xl mb-6">
            <button onclick="cambiarMolde('cuadrado')" id="btnCuadrado" class="flex-1 py-2 rounded-lg font-bold text-xs uppercase transition-all bg-white text-orange-600 shadow-sm">
                Cuadrado / Rectangular
            </button>
            <button onclick="cambiarMolde('redondo')" id="btnRedondo" class="flex-1 py-2 rounded-lg font-bold text-xs uppercase transition-all text-gray-500">
                Redondo / Circular
            </button>
        </div>

        <div class="grid grid-cols-3 gap-4 mb-6">
            <div id="colLargo">
                <label id="labelLargo" class="block text-xs font-bold text-gray-500 uppercase">Largo (cm)</label>
                <input type="number" id="largo" value="20" oninput="calcular()" class="w-full p-2 border rounded-lg bg-gray-50 focus:ring-2 focus:ring-orange-300 outline-none">
            </div>
            <div id="colAncho">
                <label class="block text-xs font-bold text-gray-500 uppercase">Ancho (cm)</label>
                <input type="number" id="ancho" value="20" oninput="calcular()" class="w-full p-2 border rounded-lg bg-gray-50 focus:ring-2 focus:ring-orange-300 outline-none">
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase">Alto (cm)</label>
                <input type="number" id="alto" value="8" oninput="calcular()" class="w-full p-2 border rounded-lg bg-gray-50 focus:ring-2 focus:ring-orange-300 outline-none">
            </div>
        </div>

        <div class="bg-orange-50 rounded-xl p-4 border border-orange-200 mb-6">
            <div class="flex justify-between items-center border-b border-orange-200 pb-2 mb-2">
                <span class="font-semibold text-orange-800 uppercase text-sm">Costo Total Producción:</span>
                <span id="costoTotal" class="text-2xl font-bold text-orange-700">$0.00</span>
            </div>
            <p class="text-[10px] text-orange-600 text-center italic uppercase tracking-tighter">Precios vinculados a Google Sheets (Editables por Administrador)</p>
        </div>

        <div>
            <h3 class="text-xs font-bold text-gray-400 uppercase mb-3 tracking-widest text-center">Desglose de Insumos</h3>
            <div class="overflow-hidden rounded-xl border border-gray-100">
                <table class="w-full text-left text-sm">
                    <thead class="bg-gray-50 text-gray-400 uppercase text-[10px]">
                        <tr>
                            <th class="px-4 py-3">Ingrediente</th>
                            <th class="px-2 py-3 text-center">Cantidad</th>
                            <th class="px-4 py-3 text-right">Sub-Precio</th>
                        </tr>
                    </thead>
                    <tbody id="listaIngredientes" class="divide-y divide-gray-50">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const URL_NUBE = "https://script.google.com/macros/s/AKfycbzl8cTzjvf06emxsDCrhRSaGo2ImlLU2Mgiu8_NDiaW6dSQHw6wv4-XJLiq9KxCP3oBg/exec";
        let precios = {};
        let modoMolde = 'cuadrado';

        function cambiarMolde(tipo) {
            modoMolde = tipo;
            document.getElementById('colAncho').style.display = (tipo === 'redondo') ? 'none' : 'block';
            document.getElementById('labelLargo').innerText = (tipo === 'redondo') ? "Diámetro (cm)" : "Largo (cm)";
            
            // Estilos de botones
            document.getElementById('btnCuadrado').className = (tipo === 'cuadrado') ? "flex-1 py-2 rounded-lg font-bold text-xs uppercase bg-white text-orange-600 shadow-sm" : "flex-1 py-2 rounded-lg font-bold text-xs uppercase text-gray-500";
            document.getElementById('btnRedondo').className = (tipo === 'redondo') ? "flex-1 py-2 rounded-lg font-bold text-xs uppercase bg-white text-orange-600 shadow-sm" : "flex-1 py-2 rounded-lg font-bold text-xs uppercase text-gray-500";
            
            calcular();
        }

        async function cargarPrecios() {
            try {
                const res = await fetch(URL_NUBE);
                precios = await res.json();
            } catch (e) {
                // Respaldo manual si falla la nube
                precios = { "Harina": 0.001, "Azúcar": 0.001, "Margarina": 0.002, "Huevos": 0.010, "Vainilla": 0.002 };
            }
            calcular();
        }

        function calcular() {
            const l = parseFloat(document.getElementById('largo').value) || 0;
            const a = parseFloat(document.getElementById('ancho').value) || 0;
            const h = parseFloat(document.getElementById('alto').value) || 0;
            
            let volumen = (modoMolde === 'cuadrado') ? (l * a * h) : (Math.PI * Math.pow(l / 2, 2) * h);

            // Factores de receta basados en tus tablas de Excel
            const receta = [
    { n: "Harina", f: 0.20 },
    { n: "Jugo de Naranja", f: 0.15 },
    { n: "Azúcar", f: 0.16 },
    { n: "Polvo de Hornear", f: 0.01 },
    { n: "Aceite", f: 0.10 },
    { n: "Sal", f: 0.002 },
    { n: "Huevos", f: 0.08 },
    { n: "Vainilla", f: 0.016 }
];

            let costoAcumulado = 0;
            let htmlFilas = "";

            receta.forEach(ing => {
                const cantidad = volumen * ing.factor;
                const precioUnitario = precios[ing.nombre] || 0; // Extraído de Google Sheets
                const subTotal = cantidad * precioUnitario;
                
                costoAcumulado += subTotal;

                htmlFilas += `
                    <tr class="hover:bg-orange-50/50 transition-colors">
                        <td class="px-4 py-3 font-medium text-gray-700">${ing.nombre}</td>
                        <td class="px-2 py-3 text-center text-gray-500">${cantidad.toFixed(1)} ${ing.nombre === 'Vainilla' ? 'ml' : 'gr'}</td>
                        <td class="px-4 py-3 text-right text-orange-600 font-bold">$${subTotal.toFixed(3)}</td>
                    </tr>
                `;
            });

            document.getElementById('costoTotal').innerText = `$${costoAcumulado.toFixed(2)}`;
            document.getElementById('listaIngredientes').innerHTML = htmlFilas;
        }

        window.onload = cargarPrecios;
    </script>
</body>
</html>
