<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Torta de Naranja Pro</title>
    <!-- Tailwind CSS para el diseño -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #fefaf6; -webkit-tap-highlight-color: transparent; }
        .card-shadow { box-shadow: 0 10px 25px -5px rgba(249, 115, 22, 0.1), 0 8px 10px -6px rgba(249, 115, 22, 0.1); }
        /* Quitar flechas de los inputs numéricos */
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }
        .transition-value { transition: all 0.2s ease; }
    </style>
</head>
<body class="p-2 md:p-8 font-sans">
    <div class="max-w-5xl mx-auto">
        <!-- Encabezado Principal -->
        <div class="bg-gradient-to-r from-orange-600 to-amber-500 rounded-t-2xl md:rounded-t-3xl p-6 text-white shadow-lg text-center">
            <h1 class="text-2xl md:text-4xl font-extrabold uppercase tracking-tighter mb-1">Torta de Naranja</h1>
            <p class="text-orange-100 font-medium italic text-xs">Calculadora Profesional de Repostería</p>
        </div>

        <div class="bg-white rounded-b-2xl md:rounded-b-3xl card-shadow border border-orange-50 p-4 md:p-10">
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 md:gap-10">
                
                <!-- Columna de Configuración (Izquierda) -->
                <div class="lg:col-span-4 space-y-6">
                    <section>
                        <h2 class="text-orange-600 font-bold uppercase text-[10px] tracking-widest mb-3 flex items-center">
                            <span class="bg-orange-100 p-2 rounded-lg mr-2">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" /></svg>
                            </span>
                            Forma del Molde
                        </h2>
                        <div class="flex p-1 bg-gray-100 rounded-xl">
                            <button onclick="setShape('cuadrado')" id="btn-cuadrado" class="flex-1 py-2 text-xs font-bold rounded-lg transition-all bg-white shadow text-orange-600">CUADRADA</button>
                            <button onclick="setShape('redondo')" id="btn-redondo" class="flex-1 py-2 text-xs font-bold rounded-lg transition-all text-gray-500 hover:text-orange-400 uppercase">REDONDA</button>
                        </div>
                    </section>

                    <section class="bg-orange-50 p-5 rounded-2xl border border-orange-100 space-y-4">
                        <h3 id="label-dimensiones" class="text-orange-800 font-bold text-xs uppercase tracking-tight">Dimensiones (cm)</h3>
                        
                        <div id="inputs-container" class="grid grid-cols-2 lg:grid-cols-1 gap-3">
                            <!-- Los inputs se generan dinámicamente -->
                        </div>
                    </section>

                    <button onclick="copyToClipboard()" class="w-full bg-gray-800 hover:bg-black active:scale-95 text-white font-bold py-3 rounded-xl transition-all flex items-center justify-center gap-2 text-sm group">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3" /></svg>
                        COPIAR INGREDIENTES
                    </button>
                </div>

                <!-- Columna de Resultados (Derecha) -->
                <div class="lg:col-span-8">
                    <div class="overflow-x-auto rounded-2xl border border-gray-100 shadow-sm bg-white">
                        <table class="w-full min-w-[450px]">
                            <thead>
                                <tr class="bg-gray-50 text-gray-400 text-[10px] uppercase tracking-widest border-b border-gray-100">
                                    <th class="px-4 py-4 text-left font-bold w-12">N°</th>
                                    <th class="px-4 py-4 text-left font-bold">Ingrediente</th>
                                    <th class="px-4 py-4 text-center font-bold">%</th>
                                    <th class="px-4 py-4 text-right font-bold" id="header-peso">Cantidad (g)</th>
                                </tr>
                            </thead>
                            <tbody id="tabla-body" class="divide-y divide-gray-50">
                                <!-- Filas generadas por JavaScript -->
                            </tbody>
                            <tfoot>
                                <tr class="bg-orange-600 text-white">
                                    <td colspan="2" class="px-4 py-4 font-bold rounded-bl-xl">PESO TOTAL MASA</td>
                                    <td id="total-porcentaje" class="px-4 py-4 text-center font-medium opacity-80 text-sm">---</td>
                                    <td id="total-gramos" class="px-4 py-4 text-right font-black text-xl md:text-2xl rounded-br-xl">0.0</td>
                                </tr>
                            </tfoot>
                        </table>
                    </div>
                    <div class="mt-4 flex flex-col md:flex-row justify-between items-center text-[10px] text-gray-400 italic gap-2">
                        <p>* Basado en los estándares de tus hojas de cálculo.</p>
                        <p>Densidad ajustada: <span id="densidad-debug">---</span></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Mensaje de Confirmación (Toast) -->
    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-gray-900 text-white px-6 py-3 rounded-full text-xs font-bold opacity-0 transition-opacity pointer-events-none z-50 shadow-2xl">
        ¡Copiado al portapapeles!
    </div>

    <script>
        let currentShape = 'cuadrado';
        
        // Ingredientes y porcentajes exactos de tu captura
        const recetaBase = [
            { id: 1, nombre: "Harina", porcentaje: 100.0 },
            { id: 2, nombre: "Jugo de Naranja", porcentaje: 39.2 },
            { id: 3, nombre: "Azúcar", porcentaje: 95.7 },
            { id: 4, nombre: "Polvo de Hornear", porcentaje: 3.4 },
            { id: 5, nombre: "Aceite", porcentaje: 32.6 },
            { id: 6, nombre: "Sal", porcentaje: 2.3 },
            { id: 7, nombre: "Huevos", porcentaje: 71.9 },
            { id: 8, nombre: "Vainilla", porcentaje: 3.0 }
        ];

        // Factores de densidad calibrados con tus tablas
        const DENSIDAD_CUADRADA = 1147.0 / (2.5 * 28 * 39);
        const volumenRefRedonda = Math.PI * Math.pow(14.5 / 2, 2) * 9.5;
        const DENSIDAD_REDONDA = 659.1 / volumenRefRedonda;

        function setShape(shape) {
            currentShape = shape;
            const bC = document.getElementById('btn-cuadrado');
            const bR = document.getElementById('btn-redondo');
            const label = document.getElementById('label-dimensiones');
            
            if(shape === 'cuadrado') {
                bC.className = "flex-1 py-2 text-xs font-bold rounded-lg transition-all bg-white shadow text-orange-600";
                bR.className = "flex-1 py-2 text-xs font-bold rounded-lg text-gray-500 hover:text-orange-400 uppercase";
                label.innerText = "Dimensiones Cuadrada (cm)";
            } else {
                bR.className = "flex-1 py-2 text-xs font-bold rounded-lg bg-white shadow text-orange-600 uppercase";
                bC.className = "flex-1 py-2 text-xs font-bold rounded-lg text-gray-500 hover:text-orange-400";
                label.innerText = "Dimensiones Redonda (cm)";
            }
            renderInputs();
            calcular();
        }

        function renderInputs() {
            const container = document.getElementById('inputs-container');
            if (currentShape === 'cuadrado') {
                container.innerHTML = `
                    <div class="col-span-2 lg:col-span-1"><label class="text-[9px] font-bold text-orange-700 uppercase mb-1 block">Altura</label><input type="number" id="altura" value="2.5" step="0.1" inputmode="decimal" oninput="calcular()" class="w-full bg-white p-3 rounded-xl border border-orange-200 outline-none focus:ring-2 focus:ring-orange-500 text-sm shadow-sm"></div>
                    <div><label class="text-[9px] font-bold text-orange-700 uppercase mb-1 block">Profundidad</label><input type="number" id="profundidad" value="28" step="0.1" inputmode="decimal" oninput="calcular()" class="w-full bg-white p-3 rounded-xl border border-orange-200 outline-none focus:ring-2 focus:ring-orange-500 text-sm shadow-sm"></div>
                    <div><label class="text-[9px] font-bold text-orange-700 uppercase mb-1 block">Largo</label><input type="number" id="largo" value="39" step="0.1" inputmode="decimal" oninput="calcular()" class="w-full bg-white p-3 rounded-xl border border-orange-200 outline-none focus:ring-2 focus:ring-orange-500 text-sm shadow-sm"></div>
                `;
            } else {
                container.innerHTML = `
                    <div><label class="text-[9px] font-bold text-orange-700 uppercase mb-1 block">Diámetro</label><input type="number" id="diametro" value="14.5" step="0.1" inputmode="decimal" oninput="calcular()" class="w-full bg-white p-3 rounded-xl border border-orange-200 outline-none focus:ring-2 focus:ring-orange-500 text-sm shadow-sm"></div>
                    <div><label class="text-[9px] font-bold text-orange-700 uppercase mb-1 block">Altura</label><input type="number" id="altura" value="9.5" step="0.1" inputmode="decimal" oninput="calcular()" class="w-full bg-white p-3 rounded-xl border border-orange-200 outline-none focus:ring-2 focus:ring-orange-500 text-sm shadow-sm"></div>
                `;
            }
        }

        function calcular() {
            let volumen = 0;
            let densidadActual = (currentShape === 'cuadrado') ? DENSIDAD_CUADRADA : DENSIDAD_REDONDA;
            const h = parseFloat(document.getElementById('altura').value) || 0;

            if (currentShape === 'cuadrado') {
                const p = parseFloat(document.getElementById('profundidad').value) || 0;
                const l = parseFloat(document.getElementById('largo').value) || 0;
                volumen = h * p * l;
            } else {
                const d = parseFloat(document.getElementById('diametro').value) || 0;
                const radio = d / 2;
                volumen = Math.PI * Math.pow(radio, 2) * h;
            }

            const pesoTotal = volumen * densidadActual;
            const porcentajeTotal = recetaBase.reduce((acc, ing) => acc + ing.porcentaje, 0);
            const pesoHarina = pesoTotal / (porcentajeTotal / 100);

            const tbody = document.getElementById('tabla-body');
            tbody.innerHTML = '';

            recetaBase.forEach(ing => {
                const cantidadGramos = (pesoHarina * ing.porcentaje) / 100;
                const tr = document.createElement('tr');
                tr.className = "hover:bg-orange-50/40 transition-all";
                tr.innerHTML = `
                    <td class="px-4 py-3 text-gray-400 text-[10px] font-mono">${ing.id}</td>
                    <td class="px-4 py-3 font-semibold text-gray-700 text-sm">${ing.nombre}</td>
                    <td class="px-4 py-3 text-center text-gray-400 text-xs">${ing.porcentaje.toFixed(1)}</td>
                    <td class="px-4 py-3 text-right font-mono font-bold text-orange-600 text-sm" id="val-${ing.id}">${cantidadGramos.toFixed(1).replace('.', ',')}</td>
                `;
                tbody.appendChild(tr);
            });

            document.getElementById('total-porcentaje').innerText = porcentajeTotal.toFixed(1).replace('.', ',') + '%';
            document.getElementById('total-gramos').innerText = pesoTotal.toFixed(1).replace('.', ',') + ' g';
            document.getElementById('densidad-debug').innerText = densidadActual.toFixed(4);
        }

        function copyToClipboard() {
            let text = `📋 TORTA DE NARANJA (${currentShape.toUpperCase()})\n`;
            text += `---------------------------\n`;
            recetaBase.forEach(ing => {
                const val = document.getElementById(`val-${ing.id}`).innerText;
                text += `• ${ing.nombre}: ${val}g\n`;
            });
            text += `---------------------------\n`;
            text += `Total Masa: ${document.getElementById('total-gramos').innerText}`;

            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);

            const toast = document.getElementById('toast');
            toast.style.opacity = '1';
            setTimeout(() => toast.style.opacity = '0', 2000);
        }

        window.onload = () => {
            renderInputs();
            calcular();
        };
    </script>
</body>
</html>
