<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Torta de Naranja - Pesaje Exacto</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f8fafc; }
        .card-shadow { box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .transition-all { transition: all 0.3s ease; }
    </style>
</head>
<body class="p-4 md:p-8 font-sans text-gray-800">

    <div class="max-w-2xl mx-auto bg-white rounded-2xl p-6 card-shadow border border-orange-100">
        <h2 class="text-2xl font-bold text-center text-orange-600 mb-6 uppercase tracking-wider">
            Torta de Naranja (Pesaje Exacto)
        </h2>

        <div class="flex bg-gray-100 p-1 rounded-xl mb-6">
            <button onclick="cambiarMolde('cuadrado')" id="btnCuadrado" class="flex-1 py-2 rounded-lg font-bold text-xs uppercase transition-all bg-white text-orange-600 shadow-sm">
                Cuadrado / Rectangular
            </button>
            <button onclick="cambiarMolde('redondo')" id="btnRedondo" class="flex-1 py-2 rounded-lg font-bold text-xs uppercase transition-all text-gray-500">
                Redondo / Circular
            </button>
        </div>

        <div class="grid grid-cols-3 gap-4 mb-6">
            <div id="colLargo">
                <label id="labelLargo" class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Largo (cm)</label>
                <input type="number" id="largo" value="20" oninput="calcular()" class="w-full p-2 border rounded-lg bg-gray-50 focus:ring-2 focus:ring-orange-300 outline-none font-semibold">
            </div>
            <div id="colAncho">
                <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Ancho (cm)</label>
                <input type="number" id="ancho" value="20" oninput="calcular()" class="w-full p-2 border rounded-lg bg-gray-50 focus:ring-2 focus:ring-orange-300 outline-none font-semibold">
            </div>
            <div>
                <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Alto (cm)</label>
                <input type="number" id="alto" value="8" oninput="calcular()" class="w-full p-2 border rounded-lg bg-gray-50 focus:ring-2 focus:ring-orange-300 outline-none font-semibold">
            </div>
        </div>

        <div class="bg-orange-50 rounded-xl p-4 border border-orange-200 mb-6 text-center">
            <div class="flex justify-between items-center border-b border-orange-200 pb-2 mb-2">
                <span class="font-semibold text-orange-800 uppercase text-xs">Costo Total Producción:</span>
                <span id="costoTotal" class="text-3xl font-bold text-orange-700">$0.00</span>
            </div>
            <p id="estadoConexion" class="text-[9px] text-gray-400 uppercase tracking-widest italic">Sincronizando con Google Sheets...</p>
        </div>

        <div>
            <h3 class="text-xs font-bold text-gray-400 uppercase mb-3 tracking-widest text-center">Desglose de Insumos (Todo en Gramos)</h3>
            <div class="overflow-hidden rounded-xl border border-gray-100">
                <table class="w-full text-left text-sm">
                    <thead class="bg-gray-50 text-gray-400 uppercase text-[10px]">
                        <tr>
                            <th class="px-4 py-3">Ingrediente</th>
                            <th class="px-2 py-3 text-center">Peso</th>
                            <th class="px-4 py-3 text-right">Sub-Precio</th>
                        </tr>
                    </thead>
                    <tbody id="listaIngredientes" class="divide-y divide-gray-50"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const URL_NUBE = "https://script.google.com/macros/s/AKfycbzl8cTzjvfo6emxsDCrhRSaGo2ImlLU2Mgiu8_NDiaW6dSQHw6wv4-XJLiq9QkXcP3oBg/exec";
        let precios = {};
        let modoMolde = 'cuadrado';

        function cambiarMolde(tipo) {
            modoMolde = tipo;
            document.getElementById('colAncho').style.display = (tipo === 'redondo') ? 'none' : 'block';
            document.getElementById('labelLargo').innerText = (tipo === 'redondo') ? "Diámetro (cm)" : "Largo (cm)";
            
            const btnC = document.getElementById('btnCuadrado');
            const btnR = document.getElementById('btnRedondo');
            
            if(tipo === 'cuadrado') {
                btnC.className = "flex-1 py-2 rounded-lg font-bold text-xs uppercase bg-white text-orange-600 shadow-sm";
                btnR.className = "flex-1 py-2 rounded-lg font-bold text-xs uppercase text-gray-500";
            } else {
                btnR.className = "flex-1 py-2 rounded-lg font-bold text-xs uppercase bg-white text-orange-600 shadow-sm";
                btnC.className = "flex-1 py-2 rounded-lg font-bold text-xs uppercase text-gray-500";
            }
            calcular();
        }

        async function cargarPrecios() {
            try {
                const res = await fetch(URL_NUBE);
                const data = await res.json();
                precios = Object.keys(data).reduce((acc, key) => {
                    // Limpieza profunda de los precios (quita $, comas por puntos, etc)
                    let precioLimpio = String(data[key]).replace('$', '').replace(/\s/g, '').replace(',', '.');
                    acc[key.toLowerCase().trim()] = parseFloat(precioLimpio) || 0;
                    return acc;
                }, {});
                
                const statusMsg = document.getElementById('estadoConexion');
                statusMsg.innerText = "✓ Precios Sincronizados";
                statusMsg.style.color = "#16a34a";
            } catch (e) {
                const statusMsg = document.getElementById('estadoConexion');
                statusMsg.innerText = "⚠ Usando datos locales";
                statusMsg.style.color = "#dc2626";
            }
            calcular();
        }

        function calcular() {
            const l = parseFloat(document.getElementById('largo').value) || 0;
            const a = parseFloat(document.getElementById('ancho').value) || 0;
            const h = parseFloat(document.getElementById('alto').value) || 0;
            
            let volumen = (modoMolde === 'cuadrado') ? (l * a * h) : (Math.PI * Math.pow(l / 2, 2) * h);

            // Definimos la receta con la unidad de compra para la carpintería interna
            const receta = [
                { nombre: "Harina", factor: 0.20, unidadCompra: "kilo" },
                { nombre: "Jugo de Naranja", factor: 0.15, unidadCompra: "kilo" },
                { nombre: "Azúcar", factor: 0.16, unidadCompra: "kilo" },
                { nombre: "Polvo de Hornear", factor: 0.01, unidadCompra: "kilo" },
                { nombre: "Aceite", factor: 0.10, unidadCompra: "kilo" },
                { nombre: "Sal", factor: 0.002, unidadCompra: "kilo" },
                { nombre: "Huevos", factor: 0.08, unidadCompra: "carton" },
                { nombre: "Vainilla", factor: 0.016, unidadCompra: "kilo" }
            ];

            let costoAcumulado = 0;
            let htmlFilas = "";

            receta.forEach(ing => {
                const cantidadGramos = volumen * ing.factor;
                let precioPorGramo = 0;
                
                // Obtenemos el precio que pusiste en el Excel (por kilo o por cartón)
                const precioBase = precios[ing.nombre.toLowerCase().trim()] || 0;

                // Lógica de carpintería:
                if (ing.unidadCompra === "carton") {
                    // Dividimos el precio del cartón entre 1500 gr (30 huevos de 50gr)
                    precioPorGramo = precioBase / 1500;
                } else {
                    // Dividimos el precio del kilo entre 1000 gr
                    precioPorGramo = precioBase / 1000;
                }

                const subTotal = cantidadGramos * precioPorGramo;
                costoAcumulado += subTotal;

                htmlFilas += `
                    <tr class="hover:bg-orange-50/50 transition-colors">
                        <td class="px-4 py-3 font-medium text-gray-700">${ing.nombre}</td>
                        <td class="px-2 py-3 text-center text-gray-500 font-mono">
                            ${cantidadGramos.toFixed(1)} gr
                        </td>
                        <td class="px-4 py-3 text-right text-orange-600 font-bold">$${subTotal.toFixed(3)}</td>
                    </tr>
                `;
            });

            document.getElementById('costoTotal').innerText = `$${costoAcumulado.toFixed(2)}`;
            document.getElementById('listaIngredientes').innerHTML = htmlFilas;
        }

        window.onload = cargarPrecios;
    </script>
</body>
</html>
