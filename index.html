<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Panadería Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f1f5f9; }
        .card-shadow { box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.05); }
    </style>
</head>
<body class="p-4 md:p-6 font-sans text-gray-800">

    <div class="max-w-xl mx-auto bg-white rounded-3xl overflow-hidden card-shadow border border-gray-100">
        <div class="bg-orange-600 p-5 text-center">
            <h2 class="text-lg font-black text-white uppercase tracking-[0.2em]">
                Torta de Naranja
            </h2>
            <p class="text-[10px] text-orange-100 font-bold uppercase mt-1">Calculadora de Producción</p>
        </div>

        <div class="p-6">
            <div class="flex bg-gray-100 p-1 rounded-xl mb-6 text-[11px] font-bold uppercase">
                <button onclick="cambiarMolde('cuadrado')" id="btnCuadrado" class="flex-1 py-2 rounded-lg transition-all bg-white text-orange-600 shadow-sm">
                    Cuadrado / Rectangular
                </button>
                <button onclick="cambiarMolde('redondo')" id="btnRedondo" class="flex-1 py-2 rounded-lg transition-all text-gray-400">
                    Redondo / Circular
                </button>
            </div>

            <div class="grid grid-cols-3 gap-3 mb-6">
                <div id="colLargo">
                    <label id="labelLargo" class="block text-[9px] font-black text-gray-400 uppercase mb-1 ml-1">Largo (cm)</label>
                    <input type="number" id="largo" value="20" oninput="calcular()" class="w-full p-2.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-orange-500 outline-none font-bold text-center">
                </div>
                <div id="colAncho">
                    <label class="block text-[9px] font-black text-gray-400 uppercase mb-1 ml-1">Ancho (cm)</label>
                    <input type="number" id="ancho" value="20" oninput="calcular()" class="w-full p-2.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-orange-500 outline-none font-bold text-center">
                </div>
                <div>
                    <label class="block text-[9px] font-black text-gray-400 uppercase mb-1 ml-1">Alto (cm)</label>
                    <input type="number" id="alto" value="8" oninput="calcular()" class="w-full p-2.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-orange-500 outline-none font-bold text-center">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3 mb-6">
                <div class="bg-orange-50 border border-orange-100 rounded-2xl p-3 text-center">
                    <p class="text-[9px] uppercase font-black text-orange-400 mb-0.5">Costo Total</p>
                    <p id="costoTotal" class="text-xl font-black text-orange-700">$0,00</p>
                </div>
                <div class="bg-slate-50 border border-slate-100 rounded-2xl p-3 text-center">
                    <p class="text-[9px] uppercase font-black text-slate-400 mb-0.5">Peso de Masa</p>
                    <p id="pesoTotalMasa" class="text-xl font-black text-slate-700">0 gr</p>
                </div>
            </div>

            <div class="mb-4 text-center">
                <span id="estadoConexion" class="px-3 py-1 rounded-full text-[9px] font-bold uppercase tracking-wider bg-gray-100 text-gray-400">
                    Sincronizando...
                </span>
            </div>

            <div class="overflow-hidden rounded-xl border border-gray-100">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-gray-50 text-gray-400 uppercase text-[9px] font-black">
                        <tr>
                            <th class="pl-4 py-3 w-10">#</th>
                            <th class="py-3">Ingrediente</th>
                            <th class="pr-4 py-3 text-right">Cantidad / Sub-Precio</th>
                        </tr>
                    </thead>
                    <tbody id="listaIngredientes" class="divide-y divide-gray-50"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const URL_NUBE = "https://script.google.com/macros/s/AKfycbzl8cTzjvfo6emxsDCrhRSaGo2ImlLU2Mgiu8_NDiaW6dSQHw6wv4-XJLiq9QkXcP3oBg/exec";
        let precios = {};
        let modoMolde = 'cuadrado';

        function formatLatam(num, dec = 2) {
            return new Intl.NumberFormat('de-DE', {
                minimumFractionDigits: dec,
                maximumFractionDigits: dec
            }).format(num);
        }

        function cambiarMolde(tipo) {
            modoMolde = tipo;
            document.getElementById('colAncho').style.visibility = (tipo === 'redondo') ? 'hidden' : 'visible';
            document.getElementById('labelLargo').innerText = (tipo === 'redondo') ? "Diámetro (cm)" : "Largo (cm)";
            
            const btnC = document.getElementById('btnCuadrado');
            const btnR = document.getElementById('btnRedondo');
            
            if(tipo === 'cuadrado') {
                btnC.classList.add('bg-white', 'text-orange-600', 'shadow-sm');
                btnR.classList.remove('bg-white', 'text-orange-600', 'shadow-sm');
                btnR.classList.add('text-gray-400');
            } else {
                btnR.classList.add('bg-white', 'text-orange-600', 'shadow-sm');
                btnC.classList.remove('bg-white', 'text-orange-600', 'shadow-sm');
                btnC.classList.add('text-gray-400');
            }
            calcular();
        }

        async function cargarPrecios() {
            try {
                const res = await fetch(URL_NUBE);
                const data = await res.json();
                precios = Object.keys(data).reduce((acc, key) => {
                    let p = String(data[key]).replace('$', '').replace(/\s/g, '').replace(',', '.');
                    acc[key.toLowerCase().trim()] = parseFloat(p) || 0;
                    return acc;
                }, {});
                
                const status = document.getElementById('estadoConexion');
                status.innerText = "✓ Precios Actualizados";
                status.className = "px-3 py-1 rounded-full text-[9px] font-bold uppercase bg-green-50 text-green-500";
            } catch (e) {
                const status = document.getElementById('estadoConexion');
                status.innerText = "⚠ Usando Datos Locales";
                status.className = "px-3 py-1 rounded-full text-[9px] font-bold uppercase bg-red-50 text-red-400";
            }
            calcular();
        }

        function calcular() {
            const l = parseFloat(document.getElementById('largo').value) || 0;
            const a = parseFloat(document.getElementById('ancho').value) || 0;
            const h = parseFloat(document.getElementById('alto').value) || 0;
            
            let volumen = (modoMolde === 'cuadrado') ? (l * a * h) : (Math.PI * Math.pow(l / 2, 2) * h);

            const receta = [
                { nombre: "Harina", factor: 0.20, tipo: "kilo" },
                { nombre: "Jugo de Naranja", factor: 0.15, tipo: "kilo" },
                { nombre: "Azúcar", factor: 0.16, tipo: "kilo" },
                { nombre: "Polvo de Hornear", factor: 0.01, tipo: "kilo" },
                { nombre: "Aceite", factor: 0.10, tipo: "kilo" },
                { nombre: "Sal", factor: 0.002, tipo: "kilo" },
                { nombre: "Huevos", factor: 0.08, tipo: "carton" },
                { nombre: "Vainilla", factor: 0.016, tipo: "kilo" }
            ];

            let costoTotal = 0;
            let pesoTotalMasa = 0;
            let html = "";

            receta.forEach((ing, index) => {
                const gr = volumen * ing.factor;
                pesoTotalMasa += gr;
                
                const precioBase = precios[ing.nombre.toLowerCase().trim()] || 0;
                const precioGramo = (ing.tipo === "carton") ? (precioBase / 1500) : (precioBase / 1000);
                const subtotal = gr * precioGramo;
                costoTotal += subtotal;

                html += `
                    <tr class="hover:bg-slate-50 transition-colors">
                        <td class="pl-4 py-3 text-[10px] font-black text-gray-300 italic">${index + 1}</td>
                        <td class="py-3 text-[12px] font-bold text-gray-700">${ing.nombre}</td>
                        <td class="pr-4 py-3 text-right">
                            <div class="text-[12px] font-black text-gray-900">${formatLatam(gr, 1)} gr</div>
                            <div class="text-[10px] font-bold text-orange-400">$ ${formatLatam(subtotal, 3)}</div>
                        </td>
                    </tr>
                `;
            });

            document.getElementById('costoTotal').innerText = `$ ${formatLatam(costoTotal, 2)}`;
            document.getElementById('pesoTotalMasa').innerText = `${formatLatam(pesoTotalMasa, 0)} gr`;
            document.getElementById('listaIngredientes').innerHTML = html;
        }

        window.onload = cargarPrecios;
    </script>
</body>
</html>
