<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Panadería - Gestión de Costos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f8fafc; }
        .card-shadow { box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body class="p-4 md:p-8 font-sans text-gray-800">

    <div class="max-w-2xl mx-auto bg-white rounded-3xl p-6 card-shadow border border-orange-100">
        <h2 class="text-2xl font-black text-center text-orange-600 mb-6 uppercase tracking-tighter">
            Torta de Naranja
        </h2>

        <div class="flex bg-gray-100 p-1 rounded-2xl mb-6">
            <button onclick="cambiarMolde('cuadrado')" id="btnCuadrado" class="flex-1 py-3 rounded-xl font-bold text-xs uppercase transition-all bg-white text-orange-600 shadow-sm">
                Cuadrado
            </button>
            <button onclick="cambiarMolde('redondo')" id="btnRedondo" class="flex-1 py-3 rounded-xl font-bold text-xs uppercase transition-all text-gray-500">
                Redondo
            </button>
        </div>

        <div class="grid grid-cols-3 gap-3 mb-8">
            <div id="colLargo">
                <label id="labelLargo" class="block text-[10px] font-black text-gray-400 uppercase mb-1 ml-1">Largo (cm)</label>
                <input type="number" id="largo" value="20" oninput="calcular()" class="w-full p-3 border-2 border-gray-100 rounded-xl focus:border-orange-400 outline-none font-bold text-lg">
            </div>
            <div id="colAncho">
                <label class="block text-[10px] font-black text-gray-400 uppercase mb-1 ml-1">Ancho (cm)</label>
                <input type="number" id="ancho" value="20" oninput="calcular()" class="w-full p-3 border-2 border-gray-100 rounded-xl focus:border-orange-400 outline-none font-bold text-lg">
            </div>
            <div>
                <label class="block text-[10px] font-black text-gray-400 uppercase mb-1 ml-1">Alto (cm)</label>
                <input type="number" id="alto" value="8" oninput="calcular()" class="w-full p-3 border-2 border-gray-100 rounded-xl focus:border-orange-400 outline-none font-bold text-lg">
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-8">
            <div class="bg-orange-600 rounded-2xl p-4 text-white shadow-lg shadow-orange-200">
                <p class="text-[10px] uppercase font-bold opacity-80 mb-1">Costo Total</p>
                <p id="costoTotal" class="text-2xl font-black">$0,00</p>
            </div>
            <div class="bg-gray-800 rounded-2xl p-4 text-white shadow-lg shadow-gray-200">
                <p class="text-[10px] uppercase font-bold opacity-80 mb-1">Peso de Masa</p>
                <p id="pesoTotalMasa" class="text-2xl font-black">0 gr</p>
            </div>
        </div>

        <div class="mb-6 text-center">
            <span id="estadoConexion" class="px-4 py-1 rounded-full text-[10px] font-bold uppercase tracking-widest bg-gray-100 text-gray-400">
                Sincronizando...
            </span>
        </div>

        <div class="overflow-hidden rounded-2xl border border-gray-100">
            <table class="w-full text-left">
                <thead class="bg-gray-50 text-gray-400 uppercase text-[9px] font-black">
                    <tr>
                        <th class="px-4 py-4">Insumo</th>
                        <th class="px-4 py-4 text-right">Cantidad / Precio</th>
                    </tr>
                </thead>
                <tbody id="listaIngredientes" class="divide-y divide-gray-50"></tbody>
            </table>
        </div>
    </div>

    <script>
        const URL_NUBE = "https://script.google.com/macros/s/AKfycbzl8cTzjvfo6emxsDCrhRSaGo2ImlLU2Mgiu8_NDiaW6dSQHw6wv4-XJLiq9QkXcP3oBg/exec";
        let precios = {};
        let modoMolde = 'cuadrado';

        // Función para formato Latinoamericano (Punto para miles, Coma para decimales)
        function formatLatam(num, dec = 2) {
            return new Intl.NumberFormat('de-DE', {
                minimumFractionDigits: dec,
                maximumFractionDigits: dec
            }).format(num);
        }

        function cambiarMolde(tipo) {
            modoMolde = tipo;
            document.getElementById('colAncho').style.display = (tipo === 'redondo') ? 'none' : 'block';
            document.getElementById('labelLargo').innerText = (tipo === 'redondo') ? "Diámetro (cm)" : "Largo (cm)";
            
            const btnC = document.getElementById('btnCuadrado');
            const btnR = document.getElementById('btnRedondo');
            
            if(tipo === 'cuadrado') {
                btnC.className = "flex-1 py-3 rounded-xl font-bold text-xs uppercase bg-white text-orange-600 shadow-sm";
                btnR.className = "flex-1 py-3 rounded-xl font-bold text-xs uppercase text-gray-500";
            } else {
                btnR.className = "flex-1 py-3 rounded-xl font-bold text-xs uppercase bg-white text-orange-600 shadow-sm";
                btnC.className = "flex-1 py-3 rounded-xl font-bold text-xs uppercase text-gray-500";
            }
            calcular();
        }

        async function cargarPrecios() {
            try {
                const res = await fetch(URL_NUBE);
                const data = await res.json();
                precios = Object.keys(data).reduce((acc, key) => {
                    let p = String(data[key]).replace('$', '').replace(/\s/g, '').replace(',', '.');
                    acc[key.toLowerCase().trim()] = parseFloat(p) || 0;
                    return acc;
                }, {});
                
                const status = document.getElementById('estadoConexion');
                status.innerText = "✓ Conectado a la Nube";
                status.className = "px-4 py-1 rounded-full text-[10px] font-bold uppercase tracking-widest bg-green-100 text-green-600";
            } catch (e) {
                const status = document.getElementById('estadoConexion');
                status.innerText = "⚠ Usando Datos Locales";
                status.className = "px-4 py-1 rounded-full text-[10px] font-bold uppercase tracking-widest bg-red-100 text-red-600";
            }
            calcular();
        }

        function calcular() {
            const l = parseFloat(document.getElementById('largo').value) || 0;
            const a = parseFloat(document.getElementById('ancho').value) || 0;
            const h = parseFloat(document.getElementById('alto').value) || 0;
            
            let volumen = (modoMolde === 'cuadrado') ? (l * a * h) : (Math.PI * Math.pow(l / 2, 2) * h);

            const receta = [
                { nombre: "Harina", factor: 0.20, tipo: "kilo" },
                { nombre: "Jugo de Naranja", factor: 0.15, tipo: "kilo" },
                { nombre: "Azúcar", factor: 0.16, tipo: "kilo" },
                { nombre: "Polvo de Hornear", factor: 0.01, tipo: "kilo" },
                { nombre: "Aceite", factor: 0.10, tipo: "kilo" },
                { nombre: "Sal", factor: 0.002, tipo: "kilo" },
                { nombre: "Huevos", factor: 0.08, tipo: "carton" },
                { nombre: "Vainilla", factor: 0.016, tipo: "kilo" }
            ];

            let costoTotal = 0;
            let pesoTotalMasa = 0;
            let html = "";

            receta.forEach(ing => {
                const gr = volumen * ing.factor;
                pesoTotalMasa += gr;
                
                const precioBase = precios[ing.nombre.toLowerCase().trim()] || 0;
                const precioGramo = (ing.tipo === "carton") ? (precioBase / 1500) : (precioBase / 1000);
                const subtotal = gr * precioGramo;
                costoTotal += subtotal;

                html += `
                    <tr class="hover:bg-orange-50/50">
                        <td class="px-4 py-4 font-bold text-gray-700 text-sm">
                            ${ing.nombre}
                        </td>
                        <td class="px-4 py-4 text-right">
                            <div class="text-sm font-black text-gray-900">${formatLatam(gr, 1)} gr</div>
                            <div class="text-[11px] font-bold text-orange-500">$ ${formatLatam(subtotal, 3)}</div>
                        </td>
                    </tr>
                `;
            });

            document.getElementById('costoTotal').innerText = `$ ${formatLatam(costoTotal, 2)}`;
            document.getElementById('pesoTotalMasa').innerText = `${formatLatam(pesoTotalMasa, 0)} gr`;
            document.getElementById('listaIngredientes').innerHTML = html;
        }

        window.onload = cargarPrecios;
    </script>
</body>
</html>
