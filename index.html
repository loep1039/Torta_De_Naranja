<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión Torta de Naranja - Fernando Araujo</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            /* NUEVO ESQUEMA DE COLORES: MORADO PROFESIONAL */
            --primario-torta: #7e57c2; /* Morado base */
            --torta-oscuro: #512da8;    /* Morado oscuro para texto/borde */
            --fondo-gris: #f8faf9;
            --texto-oscuro: #1a202c;
            --blanco: #ffffff;
            --gris-claro: #edf2f7;
            --torta-claro: #f3e5f5;   /* Morado ultra claro para fondo tarjeta */
            --torta-borde: #d1c4e9;   /* Borde tarjeta */
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #e2e8f0;
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .phone-container {
            width: 100%;
            max-width: 400px;
            background: var(--blanco);
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
        }

        .status-bar {
            font-size: 0.65rem;
            padding: 8px;
            text-align: center;
            background: #f1f5f9;
            color: #718096;
            font-weight: 600;
        }

        .header-card {
            background-color: var(--primario-torta);
            color: white;
            padding: 20px;
            text-align: center;
            border-radius: 20px 20px 0 0;
            margin: 10px;
        }

        .header-card p { margin: 0; font-size: 0.65rem; opacity: 0.9; text-transform: uppercase;}
        .header-card h1 { margin: 5px 0 0; font-size: 1.3rem; letter-spacing: 2px; font-weight: 800; text-transform: uppercase; }

        .tabs {
            display: flex;
            padding: 0 20px;
            gap: 10px;
            margin-bottom: 10px;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            border: 1px solid var(--torta-borde);
            background: var(--blanco);
            border-radius: 10px;
            font-size: 0.6rem;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            color: var(--torta-oscuro);
        }

        .tab-btn.active {
            background: var(--primario-torta);
            color: white;
        }

        .inputs-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            padding: 10px 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .input-group label {
            font-size: 0.55rem;
            font-weight: bold;
            color: #a0aec0;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .val-input {
            width: 100%;
            padding: 8px;
            border: 1px solid var(--gris-claro);
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            background: #f7fafc;
            color: var(--texto-oscuro);
        }

        .summary {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            padding: 10px 20px 20px;
        }

        .card {
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid var(--gris-claro);
        }

        .card.cost { background-color: var(--torta-claro); border: 1.5px solid var(--torta-borde); }
        .label-mini { font-size: 0.6rem; color: #a0aec0; text-transform: uppercase; font-weight: bold; }
        .card-val { font-size: 1.1rem; font-weight: bold; display: block; color: var(--texto-oscuro); }
        .card.cost .label-mini { color: var(--torta-oscuro); }
        .card.cost .card-val { color: var(--torta-oscuro); }

        .list { padding: 10px 20px; }
        .item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #f1f5f9;
        }
        .ing-name { font-weight: 700; font-size: 0.85rem; color: var(--texto-oscuro); }
        .ing-results { text-align: right; }
        .ing-qty { display: block; font-weight: 700; font-size: 0.9rem; color: var(--texto-oscuro); }
        .ing-price { font-size: 0.65rem; color: var(--primario-torta); font-weight: bold; }

        .footer { padding: 20px; text-align: center; }
        .btn-copy {
            background-color: var(--primario-torta);
            color: white;
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 15px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            font-size: 0.8rem;
            box-shadow: 0 4px 12px rgba(126, 87, 194, 0.3);
        }
        .btn-copy:hover { background-color: var(--torta-oscuro); }
    </style>
</head>
<body>

<div class="phone-container">
    <div id="status" class="status-bar"><i class="fas fa-sync fa-spin"></i> Sincronizando precios de Google Sheets...</div>
    
    <div class="header-card">
        <p>SISTEMA DE GESTIÓN - FERNANDO ARAUJO</p>
        <h1>TORTA DE NARANJA</h1>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('rect')">Cuadrada / Rect.</button>
        <button class="tab-btn" onclick="switchTab('round')">Redonda / Circ.</button>
    </div>

    <div id="inputs-rect" class="inputs-container">
        <div class="input-group">
            <label>Largo (cm)</label>
            <input type="number" id="largo" class="val-input" value="39" oninput="calcular()">
        </div>
        <div class="input-group">
            <label>Ancho (cm)</label>
            <input type="number" id="ancho" class="val-input" value="28" oninput="calcular()">
        </div>
        <div class="input-group">
            <label>Alto (cm)</label>
            <input type="number" id="alto-rect" class="val-input" value="2.5" oninput="calcular()">
        </div>
    </div>

    <div id="inputs-round" class="inputs-container" style="display: none;">
        <div class="input-group">
            <label>Diámetro (cm)</label>
            <input type="number" id="diametro" class="val-input" value="20" oninput="calcular()">
        </div>
        <div class="input-group">
            <label>Alto (cm)</label>
            <input type="number" id="alto-round" class="val-input" value="10" oninput="calcular()">
        </div>
    </div>

    <div class="summary">
        <div class="card cost">
            <span class="label-mini">Costo Producción</span>
            <span id="resCosto" class="card-val">$ 0.00</span>
        </div>
        <div class="card">
            <span class="label-mini">Masa Total</span>
            <span id="resMasa" class="card-val">0 g</span>
        </div>
    </div>

    <div class="list" id="listaIngredientes"></div>

    <div class="footer">
        <button class="btn-copy" onclick="copiarAlPortapapeles()">
            <i class="fas fa-copy"></i> Copiar al Portapapeles
        </button>
    </div>
</div>

<script>
    // URL DE MI BASE DE DATOS EN GIST
    const WEB_APP_URL = "https://gist.githubusercontent.com/loep1039/0b9fbae05f40bcd16a9a883c5ef0b999/raw/precios.json";
    let currentShape = 'rect';

    const RECETA = {
        nombre: "Torta de Naranja",
        factorHarina: 0.12058, // g de harina por cm3 (calculado de tu tabla 329.2g / (39*28*2.5))
        items: [
            { nombre: "Harina", pct: 100.0, precioKg: 0 },
            { nombre: "Jugo de Naranja", pct: 39.2, precioKg: 0 },
            { nombre: "Azúcar", pct: 95.7, precioKg: 0 },
            { nombre: "Polvo de Hornear", pct: 3.4, precioKg: 0 },
            { nombre: "Aceite", pct: 32.6, precioKg: 0 },
            { nombre: "Sal", pct: 2.3, precioKg: 0 },
            { nombre: "Huevos", pct: 71.9, precioKg: 0 },
            { nombre: "Vainilla", pct: 3.0, precioKg: 0 }
        ]
    };

    function switchTab(shape) {
        currentShape = shape;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        document.getElementById('inputs-rect').style.display = shape === 'rect' ? 'grid' : 'none';
        document.getElementById('inputs-round').style.display = shape === 'round' ? 'grid' : 'none';
        calcular();
    }

    async function sincronizarPrecios() {
        try {
            const response = await fetch(WEB_APP_URL);
            const data = await response.json();
            RECETA.items.forEach(ing => {
                const encontrado = data.find(p => p.nombre.toLowerCase().trim() === ing.nombre.toLowerCase());
                if (encontrado) ing.precioKg = encontrado.precioKg;
            });
            const statusEl = document.getElementById('status');
            statusEl.innerHTML = '<i class="fas fa-check-circle"></i> Precios sincronizados';
            statusEl.style.color = "#7e57c2";
            calcular();
        } catch (e) { 
            document.getElementById('status').innerText = "○ Error de conexión: Usando precios base"; 
            calcular(); 
        }
    }

    function calcular() {
        let volumen = 0;
        if (currentShape === 'rect') {
            const l = parseFloat(document.getElementById('largo').value) || 0;
            const w = parseFloat(document.getElementById('ancho').value) || 0;
            const h = parseFloat(document.getElementById('alto-rect').value) || 0;
            volumen = l * w * h;
        } else {
            const d = parseFloat(document.getElementById('diametro').value) || 0;
            const h = parseFloat(document.getElementById('alto-round').value) || 0;
            volumen = Math.PI * Math.pow(d/2, 2) * h;
        }

        const harinaBase = volumen * RECETA.factorHarina;
        const contenedor = document.getElementById('listaIngredientes');
        contenedor.innerHTML = '';
        let masaTotal = 0;
        let costoTotal = 0;

        RECETA.items.forEach(ing => {
            const gramos = harinaBase * (ing.pct / 100);
            
            // --- LÓGICA ESPECIAL PARA HUEVOS CONFIRMADA (Divisor 1500) ---
            let divisor = (ing.nombre === "Huevos") ? 1500 : 1000;
            const costo = (gramos / divisor) * ing.precioKg;
            
            masaTotal += gramos;
            costoTotal += costo;

            contenedor.innerHTML += `
                <div class="item">
                    <span class="ing-name">${ing.nombre}</span>
                    <div class="ing-results">
                        <span class="ing-qty">${gramos.toFixed(1)} g</span>
                        <span class="ing-price">$ ${costo.toFixed(2)}</span>
                    </div>
                </div>`;
        });

        document.getElementById('resMasa').innerText = `${masaTotal.toFixed(0)} g`;
        document.getElementById('resCosto').innerText = `$ ${costoTotal.toFixed(2)}`;
    }

    function copiarAlPortapapeles() {
        const masa = document.getElementById('resMasa').innerText;
        const costo = document.getElementById('resCosto').innerText;
        let texto = `*TORTA DE NARANJA* - *${costo}*\nMASA TOTAL: ${masa}\n---\n`;
        
        let volumen = 0;
        if (currentShape === 'rect') {
            volumen = (parseFloat(document.getElementById('largo').value)||0)*(parseFloat(document.getElementById('ancho').value)||0)*(parseFloat(document.getElementById('alto-rect').value)||0);
        } else {
            volumen = Math.PI * Math.pow((parseFloat(document.getElementById('diametro').value)||0)/2, 2) * (parseFloat(document.getElementById('alto-round').value)||0);
        }
        const harinaBase = volumen * RECETA.factorHarina;

        RECETA.items.forEach(ing => {
            const gramos = harinaBase * (ing.pct / 100);
            texto += `${ing.nombre}: ${gramos.toFixed(1)}g\n`;
        });

        const el = document.createElement('textarea');
        el.value = texto; document.body.appendChild(el); el.select();
        document.execCommand('copy'); document.body.removeChild(el);
        alert("Copiado al portapapeles con éxito.");
    }

    window.onload = sincronizarPrecios;
</script>
</body>
</html>
